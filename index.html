<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel Araç Kutusu</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Background elements for glassmorphism -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="container glass">
      <header>
        <h1>Excel Araç Kutusu</h1>
        <p>Dosyalarınızı tarayıcı içinde gizlilikle birleştirin ve bölün.</p>
      </header>

      <div class="tabs">
        <button class="tab-btn active" data-tab="merge">Dosyaları Birleştir</button>
        <button class="tab-btn" data-tab="split">Dosyayı Böl</button>
      </div>

      <div class="tab-content active" id="merge-tab">
        <div class="upload-area" id="merge-upload-area">
          <i data-lucide="file-spreadsheet"></i>
          <p>Birleştirilecek Excel dosyalarını sürükleyip bırakın veya seçin</p>
          <input type="file" id="merge-files" multiple accept=".xlsx,.xls,.csv" />
        </div>
        
        <div class="file-list" id="merge-file-list"></div>
        
        <button class="primary-btn" id="merge-btn" disabled>
          <i data-lucide="combine"></i>
          Birleştir
        </button>
        <button class="primary-btn" id="merge-download-btn" style="display: none; margin-top: 10px; background-color: #10b981;">
          <i data-lucide="download"></i>
          Dosyayı İndir
        </button>
      </div>

      <div class="tab-content" id="split-tab">
        <div class="upload-area" id="split-upload-area">
          <i data-lucide="file-spreadsheet"></i>
          <p>Bölünecek dosyayı sürükleyip bırakın veya seçin</p>
          <input type="file" id="split-file" accept=".xlsx,.xls,.csv" />
        </div>
        
        <div class="file-info" id="split-file-info" style="display: none;"></div>
        
        <div class="input-group">
          <label for="split-rows">Her dosyada kaç satır olsun?</label>
          <input type="number" id="split-rows" value="1000" min="1" step="100" />
        </div>

        <button class="primary-btn" id="split-btn" disabled>
          <i data-lucide="split-square-vertical"></i>
          Böl
        </button>
        <button class="primary-btn" id="split-download-btn" style="display: none; margin-top: 10px; background-color: #10b981;">
          <i data-lucide="download"></i>
          ZIP Olarak İndir
        </button>
      </div>
    </div>
    
    <footer class="app-footer">
      <p>© 2026 Deniz Şara</p>
    </footer>

    <div class="overlay" id="loading-overlay">
      <div class="spinner"></div>
      <p id="loading-text">İşleniyor...</p>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
